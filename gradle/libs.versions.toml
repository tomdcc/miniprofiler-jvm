[versions]
asciidoctor = "4.0.5"
awaitility = "4.3.0"
build-parameters-plugin = "1.4.5"
byte-buddy = "1.18.8"
checkstyle = "12.3.1"
codenarc = "3.6.0-groovy-4.0"
develocity-plugin = "4.3.2"
eclipselink = "2.7.16"
ehcache = "2.10.9.2"
geb-groovy3 = "6.0"
geb-groovy4 = "8.0.1"
groovy-v3 = "3.0.25"
groovy-v4 = "4.0.31"
h2 = "1.4.200"
hibernate = "4.3.11.Final"
jackson = "2.21.2"
jakarta-ee-api = "9.1.0"
jakarta-jsp-api = "3.1.0"
jakarta-servlet-api = "6.0.0"
javax-ee-api = "7.0"
javax-jsp-api = "2.3.3"
javax-servlet-api-v2 = "2.3"
javax-servlet-api-v4 = "4.0.1"
jooq-compile = "3.0.0"
jooq-test = "3.9.5"
json-simple = "1.1.1"
jta = "1.1"
junit = "5.12.2"
junit-platform = "1.12.2"
# Ratpack looks for org.slf4j.impl.StaticLoggerBinder which is the old discovery mechnanism for slf4j 1.x,
# so we stay on the old version (and this corresponding logback version) to make it be quiet
logback = "1.2.11"
nexus-publish-plugin = "2.0.0"
ratpack = "1.10.0-milestone-39"
selenium-groovy3 = "4.34.0"
selenium-groovy4 = "4.41.0"
shadow = "9.4.0"
spock-groovy3 = "2.4-groovy-3.0"
spock-groovy4 = "2.4-groovy-4.0"
spring-v5 = "5.3.39"
spring-v6 = "6.2.8"
testcontainers = "2.0.3"

[libraries]
awaitility = { module = "org.awaitility:awaitility-groovy", version.ref = "awaitility" }
byte-buddy = { module = "net.bytebuddy:byte-buddy", version.ref = "byte-buddy" }
checkstyle = { module = "com.puppycrawl.tools:checkstyle", version.ref = "checkstyle" }
codenarc = { module = "org.codenarc:CodeNarc", version.ref = "codenarc" }
develocity-plugin = { module = "com.gradle:develocity-gradle-plugin", version.ref = "develocity-plugin" }
eclipselink = { module = "org.eclipse.persistence:eclipselink", version.ref = "eclipselink" }
ehcache = { module = "net.sf.ehcache:ehcache", version.ref = "ehcache" }
geb-core-groovy3 = { module = "org.gebish:geb-core", version.ref = "geb-groovy3" }
geb-core-groovy4 = { module = "org.apache.groovy.geb:geb-core", version.ref = "geb-groovy4" }
geb-spock-groovy3 = { module = "org.gebish:geb-spock", version.ref = "geb-groovy3" }
geb-spock-groovy4 = { module = "org.apache.groovy.geb:geb-spock", version.ref = "geb-groovy4" }
groovy-v3 = { module = "org.codehaus.groovy:groovy-all", version.ref = "groovy-v3" }
groovy-v4 = { module = "org.apache.groovy:groovy-all", version.ref = "groovy-v4" }
h2 = { module = "com.h2database:h2", version.ref = "h2" }
hibernate = { module = "org.hibernate:hibernate-core", version.ref = "hibernate" }
jackson-databind = { module = "com.fasterxml.jackson.core:jackson-databind", version.ref = "jackson" }
jakarta-ee-api = { module = "jakarta.platform:jakarta.jakartaee-api", version.ref = "jakarta-ee-api" }
jakarta-jsp-api = { module = "jakarta.servlet.jsp:jakarta.servlet.jsp-api", version.ref = "jakarta-jsp-api" }
jakarta-servlet-api = { module = "jakarta.servlet:jakarta.servlet-api", version.ref = "jakarta-servlet-api" }
javax-ee-api = { module = "javax:javaee-api", version.ref = "javax-ee-api" }
javax-jsp-api = { module = "javax.servlet.jsp:javax.servlet.jsp-api", version.ref = "javax-jsp-api" }
javax-servlet-api-v2 = { module = "javax.servlet:servlet-api", version.ref = "javax-servlet-api-v2" }
javax-servlet-api-v4 = { module = "javax.servlet:javax.servlet-api", version.ref = "javax-servlet-api-v4" }
jooq-compile = { module = "org.jooq:jooq", version.ref = "jooq-compile" }
jooq-test = { module = "org.jooq:jooq", version.ref = "jooq-test" }
json-simple = { module = "com.googlecode.json-simple:json-simple", version.ref = "json-simple" }
jta = { module = "javax.transaction:jta", version.ref = "jta" }
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter", version.ref = "junit" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher", version.ref = "junit-platform" }
logback = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }
nexus-publish-plugin = { module = "io.github.gradle-nexus:publish-plugin", version.ref = "nexus-publish-plugin" }
ratpack-core = { module = "io.ratpack:ratpack-core", version.ref = "ratpack" }
ratpack-groovy-test = { module = "io.ratpack:ratpack-groovy-test", version.ref = "ratpack" }
ratpack-handlebars = { module = "io.ratpack:ratpack-handlebars", version.ref = "ratpack" }
ratpack-guice = { module = "io.ratpack:ratpack-guice", version.ref = "ratpack" }
ratpack-h2 = { module = "io.ratpack:ratpack-h2", version.ref = "ratpack" }
ratpack-hikari = { module = "io.ratpack:ratpack-hikari", version.ref = "ratpack" }
ratpack-test = { module = "io.ratpack:ratpack-test", version.ref = "ratpack" }
selenium-api-groovy3 = { module = "org.seleniumhq.selenium:selenium-api", version.ref = "selenium-groovy3" }
selenium-api-groovy4 = { module = "org.seleniumhq.selenium:selenium-api", version.ref = "selenium-groovy4" }
selenium-firefox-driver-groovy3 = { module = "org.seleniumhq.selenium:selenium-firefox-driver", version.ref = "selenium-groovy3" }
selenium-firefox-driver-groovy4 = { module = "org.seleniumhq.selenium:selenium-firefox-driver", version.ref = "selenium-groovy4" }
selenium-support-groovy3 = { module = "org.seleniumhq.selenium:selenium-support", version.ref = "selenium-groovy3" }
selenium-support-groovy4 = { module = "org.seleniumhq.selenium:selenium-support", version.ref = "selenium-groovy4" }
spock-groovy3 = { module = "org.spockframework:spock-core", version.ref = "spock-groovy3" }
spock-groovy4 = { module = "org.spockframework:spock-core", version.ref = "spock-groovy4" }
spring-v5-test = { module = "org.springframework:spring-test", version.ref = "spring-v5" }
spring-v5-web = { module = "org.springframework:spring-web", version.ref = "spring-v5" }
spring-v6-test = { module = "org.springframework:spring-test", version.ref = "spring-v6" }
spring-v6-web = { module = "org.springframework:spring-web", version.ref = "spring-v6" }
testcontainers-core   = { module = "org.testcontainers:testcontainers",   version.ref = "testcontainers" }
testcontainers-junit5 = { module = "org.testcontainers:testcontainers-junit-jupiter", version.ref = "testcontainers" }

[plugins]
asciidoctor = { id = "org.asciidoctor.jvm.convert", version.ref = "asciidoctor" }
build-parameters = { id = "org.gradlex.build-parameters", version.ref = "build-parameters-plugin" }
nexus-publish = { id = "io.github.gradle-nexus.publish-plugin", version.ref = "nexus-publish-plugin" }
shadow = { id = "com.gradleup.shadow", version.ref = "shadow" }
