name: "Build Gradle project"
on: [ workflow_call ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # PR builds: fetch the merge commit + every PR commit so per-file `git log`
          # can see each modified file's recent commits. Push builds (no PR context, e.g.
          # snapshot publish on main): fall back to a full clone.
          fetch-depth: ${{ github.event.pull_request.commits && github.event.pull_request.commits + 1 || 0 }}
          submodules: recursive

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
              8
              11
              17
              21
              25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Firefox
        uses: browser-actions/setup-firefox@v1.7.1
        with:
          firefox-version: 128.10.0esr

      - name: Setup Geckodriver
        uses: browser-actions/setup-geckodriver@v0.0.0
        with:
          geckodriver-version: 0.36.0

      - name: Build and run fast tests
        run: ./gradlew assemble check --continue

      - name: Run slow tests
        uses: GabrielBB/xvfb-action@v1.7
        with:
          run: ./gradlew fullCheck --continue
